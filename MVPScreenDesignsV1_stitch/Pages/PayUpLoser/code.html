<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;700;900&amp;family=Space+Mono:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "neo-bg": "#F4F4F0",
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          fontFamily: {
            "headline": ["Public Sans", "sans-serif"],
            "body": ["Public Sans", "sans-serif"],
            "label": ["Public Sans", "sans-serif"],
            "mono": ["Space Mono", "monospace"]
          }
        },
      },
    }
  </script>
<style>
    .neo-border { border: 3px solid black; }
    .neo-shadow { shadow: 6px 6px 0px 0px rgba(0,0,0,1); }
    .neo-shadow-sm { box-shadow: 4px 4px 0px 0px rgba(0,0,0,1); }
    .neo-shadow-lg { box-shadow: 8px 8px 0px 0px rgba(0,0,0,1); }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-neo-bg font-body text-black antialiased min-h-screen pb-24">
<!-- TopAppBar -->
<header class="bg-yellow-400 dark:bg-yellow-500 text-black dark:text-black border-b-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] flex justify-between items-center w-full px-4 h-16 sticky top-0 z-40">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-black">arrow_back</span>
<h1 class="font-mono uppercase font-black tracking-tighter text-black">Ethos Resolution</h1>
</div>
<span class="material-symbols-outlined text-black">more_vert</span>
</header>
<main class="max-w-md mx-auto px-6 py-12 flex flex-col items-center">
<!-- Massive PAY UP Stamp -->
<div class="relative mb-16 mt-4">
<div class="bg-red-500 neo-border neo-shadow-lg px-8 py-4 -rotate-[10deg] inline-block">
<h2 class="text-6xl font-black italic tracking-tighter uppercase text-white leading-none">PAY UP</h2>
</div>
<!-- Decorative element -->
<div class="absolute -top-4 -right-4 bg-black text-yellow-400 px-2 py-1 font-mono text-xs font-bold neo-border rotate-12">
        DEFEAT
      </div>
</div>
<!-- Debt Card -->
<section class="w-full bg-yellow-400 neo-border neo-shadow-lg p-6 mb-8 transform hover:-translate-y-1 transition-transform">
<div class="flex items-start justify-between mb-2">
<span class="material-symbols-outlined text-4xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">sports_bar</span>
<span class="font-mono text-xs font-bold">SETTLEMENT DUE</span>
</div>
<p class="text-2xl font-black uppercase tracking-tight leading-tight">
        YOU OWE ALEX: A PINT AT THE PUB
      </p>
</section>
<!-- Contract Details Bento-ish Card -->
<section class="w-full bg-white neo-border neo-shadow-sm p-6 mb-12">
<h3 class="font-mono font-black uppercase text-sm border-b-2 border-black pb-2 mb-4">CONTRACT DETAILS</h3>
<div class="space-y-6">
<div class="flex items-center gap-4">
<div class="bg-black text-white p-2 neo-border">
<span class="material-symbols-outlined" data-weight="fill" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
</div>
<div>
<p class="font-mono text-xs text-zinc-500 font-bold uppercase">The Habit</p>
<p class="font-black text-lg uppercase">Gym 3x/week</p>
</div>
</div>
<div class="flex items-center gap-4">
<div class="bg-black text-white p-2 neo-border">
<span class="material-symbols-outlined" data-weight="fill" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
<div>
<p class="font-mono text-xs text-zinc-500 font-bold uppercase">The Opponent</p>
<p class="font-black text-lg uppercase">Alex</p>
</div>
</div>
<a class="inline-flex items-center gap-2 font-mono text-sm font-black underline decoration-4 hover:bg-black hover:text-white transition-colors p-1" href="#">
          VIEW CYCLE DETAILS
          <span class="material-symbols-outlined text-sm">open_in_new</span>
</a>
</div>
</section>
<!-- Success Image Context (Asymmetric/Stylized) -->
<div class="w-full grid grid-cols-2 gap-4 mb-8">
<div class="aspect-square bg-zinc-200 neo-border overflow-hidden">
<img class="w-full h-full object-cover grayscale contrast-125" data-alt="dramatic black and white close-up of a draft beer glass with condensation and thick foam head" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDTv0JjSM_BM3GzojjY5qa02kz9Vv0YwUN3jHEMavr3gvHKHDilq88GYLDDBbRKshnVBnUMYTcCvBn0gfBBU00rMA_QklG2PjI4RgF1r_DIMq2w-NVughhus_xvfj_nFKG8aIcUgvkoOGJgx0Mv4cls_HMcChS2qzYdDb2zD4cIuWxCvqvKZhySrcn86xrNLO6JiG-Ge46BDNKpVXzEgj9YSzU_aUYMSPrJtrKMllY4y6Ey3YBS-cfBriEoFMfCg8061IEg9RsMMSUA"/>
</div>
<div class="aspect-square bg-zinc-200 neo-border overflow-hidden mt-4">
<img class="w-full h-full object-cover grayscale contrast-125" data-alt="intense close-up of heavy dumbbells on a gritty gym floor with sharp shadows and harsh lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBs0vYStAYQ_WQ6Nu1JAlxu2wxBus-5eVe-QjsqAzDTx_7g7YPQzhlgdQFK9qhjvXHRqWguKuhYiDRZRnxmC-UZri42JDycXIY8J-CELfAnLd8ED2NGshbaMw74gj6XHwlngFEW7vNzZUtWLhiU8zV4EUB9U_-NdUBanNENwKNtmf0dgJcAct7yIh78TPJ0nxc7SMWhq-707rKtjn-XXKZaO0nv0fRcWH-BU7IWpzAcVSpwe2lweFGQN9iVdJvLVhakg5xVE1gfdAsy"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-black text-white py-6 neo-border neo-shadow-lg active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-all flex justify-center items-center gap-3">
<span class="text-2xl font-black uppercase tracking-widest font-headline">I KNOW</span>
<span class="material-symbols-outlined text-3xl">check_circle</span>
</button>
</main>
<!-- BottomNavBar suppressed for focused "Transactional/Result" screen as per Shell Visibility Rule -->
</body></html>
