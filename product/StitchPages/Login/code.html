<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f9f9f9;
        }
        .neo-shadow {
            box-shadow: 4px 4px 0px 0px #1a1c1c;
        }
        .neo-shadow-hover:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px 0px #1a1c1c;
        }
        .neo-input:focus {
            background-color: #2962ff;
            color: #ffffff;
            outline: none;
        }
        .neo-input:focus::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center p-6">
<!-- Header / Branding Section -->
<header class="flex flex-col items-center mb-8 text-center">
<div class="w-12 h-12 bg-secondary-container border-[3px] border-on-surface flex items-center justify-center neo-shadow mb-6">
<span class="material-symbols-outlined text-on-surface scale-125" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
<h1 class="font-black text-4xl md:text-5xl uppercase tracking-tighter italic text-on-surface mb-2">
            WELCOME BACK.
        </h1>
<p class="font-body text-on-surface-variant font-medium text-lg max-w-xs">
            Enter your credentials to access the vault.
        </p>
</header>
<!-- Main Login Card -->
<main class="w-full max-w-[420px]">
<div class="bg-surface-container-lowest border-[3px] border-on-surface neo-shadow p-8 flex flex-col gap-6">
<!-- Credentials Form -->
<form class="flex flex-col gap-6">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="font-black text-xs uppercase tracking-[0.1em] text-on-surface">
                        Email Address
                    </label>
<input class="w-full bg-surface border-[3px] border-on-surface p-4 font-bold text-on-surface neo-input transition-all placeholder:text-on-surface-variant/50" placeholder="ARCHITECT@ETHOS.NETWORK" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="font-black text-xs uppercase tracking-[0.1em] text-on-surface">
                            Password
                        </label>
<a class="text-[10px] font-black uppercase underline tracking-widest text-primary" href="#">Forgot?</a>
</div>
<input class="w-full bg-surface border-[3px] border-on-surface p-4 font-bold text-on-surface neo-input transition-all placeholder:text-on-surface-variant/50" placeholder="••••••••••••" type="password"/>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary py-5 border-[3px] border-on-surface neo-shadow neo-shadow-hover font-black text-lg uppercase tracking-widest transition-all" type="submit">
                    CONTINUE
                </button>
</form>
<!-- Alternative Action -->
<button class="w-full bg-secondary-container text-on-surface py-4 border-[3px] border-on-surface neo-shadow neo-shadow-hover font-black text-xs uppercase tracking-widest transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm">key</span>
                SEND EMAIL OTP
            </button>
<!-- Divider -->
<div class="flex items-center gap-4 my-2">
<div class="h-[3px] flex-grow bg-on-surface"></div>
<span class="font-black text-[10px] uppercase tracking-widest text-on-surface-variant whitespace-nowrap">OR CONNECT WITH</span>
<div class="h-[3px] flex-grow bg-on-surface"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="bg-surface border-[3px] border-on-surface p-3 neo-shadow neo-shadow-hover flex items-center justify-center gap-2 font-black text-[10px] uppercase tracking-widest">
<span class="material-symbols-outlined text-lg">ios</span>
                    Apple
                </button>
<button class="bg-surface border-[3px] border-on-surface p-3 neo-shadow neo-shadow-hover flex items-center justify-center gap-2 font-black text-[10px] uppercase tracking-widest">
<span class="material-symbols-outlined text-lg text-primary">language</span>
                    Google
                </button>
</div>
</div>
<!-- Footer Link -->
<div class="mt-8 text-center">
<p class="font-bold text-xs uppercase tracking-widest text-on-surface-variant">
                New to the network? 
                <a class="text-primary underline font-black ml-1" href="#">REQUEST ACCESS</a>
</p>
</div>
</main>
<!-- Side Decoration (Neo-Brutalist Architectural Element) -->
<div class="fixed left-0 top-0 bottom-0 w-2 bg-primary hidden lg:block"></div>
<div class="fixed right-0 top-0 bottom-0 w-2 bg-secondary-container hidden lg:block"></div>
