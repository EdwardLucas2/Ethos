name: CI

on:
    push:
        branches: [main]
    pull_request:
    workflow_dispatch:

jobs:
    backend:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6.0.2

            - uses: actions/setup-java@v5.2.0
              with:
                  java-version: "25"
                  distribution: "temurin"
                  cache: "maven"

            - name: Install dbmate
              run: |
                  curl -fsSL -o /usr/local/bin/dbmate https://github.com/amacneil/dbmate/releases/latest/download/dbmate-linux-amd64
                  chmod +x /usr/local/bin/dbmate

            - name: Format check
              working-directory: backend
              run: mvn spotless:check

            - name: Test
              working-directory: backend
              run: mvn verify

            - name: Upload coverage to Codacy
              uses: codacy/codacy-coverage-reporter-action@v1.3.0
              continue-on-error: true
              with:
                  project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
                  coverage-reports: backend/target/site/jacoco/jacoco.xml

    auth:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6.0.2

            - uses: actions/setup-node@v6.4.0
              with:
                  node-version: "24"
                  cache: "npm"
                  cache-dependency-path: auth/package-lock.json

            - name: Install dependencies
              working-directory: auth
              run: npm ci

            - name: Lint
              working-directory: auth
              run: npm run lint

            - name: Format check
              working-directory: auth
              run: npx prettier --check .

            - name: TypeScript check
              working-directory: auth
              run: npx tsc --noEmit

            - name: Test
              working-directory: auth
              run: npm test -- --coverage

            - name: Upload coverage to Codacy
              uses: codacy/codacy-coverage-reporter-action@v1.3.0
              continue-on-error: true
              with:
                  project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
                  coverage-reports: auth/coverage/lcov.info
                  language: typescript

    frontend:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6.0.2

            - uses: actions/setup-node@v6.4.0
              with:
                  node-version: "24"
                  cache: "npm"
                  cache-dependency-path: app/package-lock.json

            - name: Install dependencies
              working-directory: app
              run: npm ci

            - name: Lint
              working-directory: app
              run: npm run lint

            - name: Format check
              working-directory: app
              run: npx prettier --check .

            - name: TypeScript check
              working-directory: app
              run: npx tsc --noEmit

            - name: Test
              working-directory: app
              run: npx jest --coverage --coverageDirectory=coverage --coverageReporters=lcov --coverageReporters=text-summary

            - name: Upload coverage to Codacy
              uses: codacy/codacy-coverage-reporter-action@v1.3.0
              continue-on-error: true
              with:
                  project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
                  coverage-reports: app/coverage/lcov.info
                  language: typescript

    maestro:
        runs-on: ubuntu-latest
        # E2E is expensive — only run on pushes to main, not every PR
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        steps:
            - uses: actions/checkout@v6.0.2

            - uses: actions/setup-node@v6.4.0
              with:
                  node-version: "24"
                  cache: "npm"
                  cache-dependency-path: app/package-lock.json

            - uses: actions/setup-java@v5.2.0
              with:
                  java-version: "17"
                  distribution: "temurin"

            - name: Install app dependencies
              working-directory: app
              run: npm ci

            - name: Create CI env files
              run: |
                  printf 'DATABASE_USER=ethos\nDATABASE_PASSWORD=ci_password\nDBMATE_URL=postgresql://ethos:ci_password@localhost:5432/ethos?sslmode=disable\n' > .env.local
                  printf 'DATABASE_URL=jdbc:postgresql://postgres:5432/ethos\nDATABASE_USER=ethos\nDATABASE_PASSWORD=ci_password\nSUPERTOKENS_URL=http://supertokens:3567\n' > backend/.env
                  touch auth/.env

            - name: Start backend services
              run: docker compose -f docker/docker-compose.dev.yml up -d --wait

            - name: Install dbmate
              run: |
                  curl -fsSL -o /usr/local/bin/dbmate https://github.com/amacneil/dbmate/releases/latest/download/dbmate-linux-amd64
                  chmod +x /usr/local/bin/dbmate

            - name: Migrate database
              run: dbmate --url "postgresql://ethos:ci_password@localhost:5432/ethos?sslmode=disable" --migrations-dir backend/db/migrations migrate

            - name: Seed test user
              env:
                  TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
                  TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
              run: |
                  curl -sf -X POST http://localhost:3568/auth/signup \
                    -H "Content-Type: application/json" \
                    -d "{\"formFields\":[{\"id\":\"email\",\"value\":\"${TEST_EMAIL}\"},{\"id\":\"password\",\"value\":\"${TEST_PASSWORD}\"}]}"

            - name: Install Maestro
              run: curl -Ls "https://get.maestro.mobile.dev" | bash

            - name: Generate Android project
              working-directory: app
              run: npx expo prebuild --platform android --clean

            - name: Cache Gradle
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                  key: gradle-${{ hashFiles('app/android/**/*.gradle*', 'app/android/**/gradle-wrapper.properties') }}
                  restore-keys: gradle-

            - name: Enable KVM
              run: |
                  echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
                  sudo udevadm control --reload-rules
                  sudo udevadm trigger --name-match=kvm

            - name: Run Maestro flows
              uses: reactivecircus/android-emulator-runner@v2
              env:
                  TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
                  TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
              with:
                  api-level: 34
                  arch: x86_64
                  script: |
                      cd app
                      npx expo start &
                      timeout 120 bash -c 'until curl -sf http://localhost:8081/status > /dev/null; do sleep 2; done'
                      cd android && ./gradlew installDebug
                      cd ../..
                      $HOME/.maestro/bin/maestro test \
                        --env TEST_EMAIL="${TEST_EMAIL}" \
                        --env TEST_PASSWORD="${TEST_PASSWORD}" \
                        app/.maestro/
