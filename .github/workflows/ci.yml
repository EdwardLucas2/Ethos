name: CI

on:
    push:
        branches: [main]
    pull_request:

jobs:
    backend:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6.0.2

            - uses: actions/setup-java@v5.2.0
              with:
                  java-version: "25"
                  distribution: "temurin"
                  cache: "maven"

            - name: Install dbmate
              run: |
                  curl -fsSL -o /usr/local/bin/dbmate https://github.com/amacneil/dbmate/releases/latest/download/dbmate-linux-amd64
                  chmod +x /usr/local/bin/dbmate

            - name: Format check
              working-directory: backend
              run: mvn spotless:check

            - name: Test
              working-directory: backend
              run: mvn verify

            - name: Upload coverage to Codacy
              uses: codacy/codacy-coverage-reporter-action@v1.3
              with:
                  project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
                  coverage-reports: backend/target/site/jacoco/jacoco.xml

    auth:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6.0.2

            - uses: actions/setup-node@v6.4.0
              with:
                  node-version: "24"
                  cache: "npm"
                  cache-dependency-path: auth/package-lock.json

            - name: Install dependencies
              working-directory: auth
              run: npm ci

            - name: Lint
              working-directory: auth
              run: npm run lint

            - name: Format check
              working-directory: auth
              run: npx prettier --check .

            - name: TypeScript check
              working-directory: auth
              run: npx tsc --noEmit

            - name: Test
              working-directory: auth
              run: npm test -- --coverage

            - name: Upload coverage to Codacy
              uses: codacy/codacy-coverage-reporter-action@v1.3
              with:
                  project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
                  coverage-reports: auth/coverage/lcov.info
                  language: typescript

    frontend:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6.0.2

            - uses: actions/setup-node@v6.4.0
              with:
                  node-version: "24"
                  cache: "npm"
                  cache-dependency-path: app/package-lock.json

            - name: Install dependencies
              working-directory: app
              run: npm ci

            - name: Lint
              working-directory: app
              run: npm run lint

            - name: Format check
              working-directory: app
              run: npx prettier --check .

            - name: TypeScript check
              working-directory: app
              run: npx tsc --noEmit

            - name: Test
              working-directory: app
              run: npx jest --coverage --coverageDirectory=coverage --coverageReporters=lcov --coverageReporters=text-summary

            - name: Upload coverage to Codacy
              uses: codacy/codacy-coverage-reporter-action@v1.3
              with:
                  project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
                  coverage-reports: app/coverage/lcov.info
                  language: typescript
