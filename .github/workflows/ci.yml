name: CI

on:
    push:
        branches: [main]
    pull_request:

jobs:
    backend:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
              with:
                  java-version: "25"
                  distribution: "temurin"
                  cache: "maven"

            - name: Install dbmate
              run: |
                  curl -fsSL -o /usr/local/bin/dbmate https://github.com/amacneil/dbmate/releases/download/v2.33.0/dbmate-linux-amd64
                  echo "dfd4027141b6e4357158099bdfe6c02b286af70f8e49057937744cf80b38ea1c  /usr/local/bin/dbmate" | sha256sum -c
                  chmod +x /usr/local/bin/dbmate

            - name: Format check
              working-directory: backend
              run: mvn spotless:check

            - name: Test
              working-directory: backend
              run: mvn verify

            - name: Upload coverage to Codacy
              uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699  # v1.3.0
              continue-on-error: true
              with:
                  project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
                  coverage-reports: backend/target/site/jacoco/jacoco.xml

    auth:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: "24"
                  cache: "npm"
                  cache-dependency-path: auth/package-lock.json

            - name: Install dependencies
              working-directory: auth
              run: npm ci

            - name: Lint
              working-directory: auth
              run: npm run lint

            - name: Format check
              working-directory: auth
              run: npx prettier --check .

            - name: TypeScript check
              working-directory: auth
              run: npx tsc --noEmit

            - name: Test
              working-directory: auth
              run: npm test -- --coverage

            - name: Upload coverage to Codacy
              uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699  # v1.3.0
              continue-on-error: true
              with:
                  project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
                  coverage-reports: auth/coverage/lcov.info
                  language: typescript

    frontend:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: "24"
                  cache: "npm"
                  cache-dependency-path: app/package-lock.json

            - name: Install dependencies
              working-directory: app
              run: npm ci

            - name: Lint
              working-directory: app
              run: npm run lint

            - name: Format check
              working-directory: app
              run: npx prettier --check .

            - name: TypeScript check
              working-directory: app
              run: npx tsc --noEmit

            - name: Test
              working-directory: app
              run: npx jest --coverage --coverageDirectory=coverage --coverageReporters=lcov --coverageReporters=text-summary --passWithNoTests

            - name: Install Playwright browsers
              working-directory: app
              run: npx playwright install --with-deps chromium

            - name: Build Storybook
              working-directory: app
              run: npm run build-storybook -- --quiet

            - name: Storybook tests
              working-directory: app
              run: |
                  npx http-server storybook-static -p 6006 --silent &
                  npx wait-on tcp:6006 --timeout 60000 && npm run test-storybook

            - name: Upload coverage to Codacy
              if: always()
              uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699  # v1.3.0
              continue-on-error: true
              with:
                  project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
                  coverage-reports: app/coverage/lcov.info
                  language: typescript
