name: E2E

on:
    push:
        branches: [main]
    workflow_dispatch:

jobs:
    maestro:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6.0.2

            - uses: actions/setup-node@v6.4.0
              with:
                  node-version: "24"
                  cache: "npm"
                  cache-dependency-path: app/package-lock.json

            - uses: actions/setup-java@v5.2.0
              with:
                  java-version: "17"
                  distribution: "temurin"

            - name: Install app dependencies
              working-directory: app
              run: npm ci

            - name: Create CI env files
              run: |
                  printf 'DATABASE_USER=ethos\nDATABASE_PASSWORD=ci_password\nDBMATE_URL=postgresql://ethos:ci_password@localhost:5432/ethos?sslmode=disable\n' > .env.local
                  printf 'DATABASE_URL=jdbc:postgresql://postgres:5432/ethos\nDATABASE_USER=ethos\nDATABASE_PASSWORD=ci_password\nSUPERTOKENS_URL=http://supertokens:3567\n' > backend/.env
                  touch auth/.env

            - name: Start backend services
              run: docker compose -f docker/docker-compose.dev.yml up -d --wait

            - name: Install dbmate
              run: |
                  curl -fsSL -o /usr/local/bin/dbmate https://github.com/amacneil/dbmate/releases/download/v2.33.0/dbmate-linux-amd64
                  chmod +x /usr/local/bin/dbmate

            - name: Migrate database
              run: dbmate --url "postgresql://ethos:ci_password@localhost:5432/ethos?sslmode=disable" --migrations-dir backend/db/migrations migrate

            - name: Seed test user
              env:
                  TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
                  TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
              run: |
                  PAYLOAD=$(jq -cn \
                    --arg email "$TEST_EMAIL" \
                    --arg password "$TEST_PASSWORD" \
                    '{formFields:[{id:"email",value:$email},{id:"password",value:$password}]}')
                  curl -sf -X POST http://localhost:3568/auth/signup \
                    -H "Content-Type: application/json" \
                    -d "$PAYLOAD" \
                    | grep -q '"status":"OK"'

            - uses: ./.github/actions/setup-maestro
              with:
                  version: "2.5.1"

            - name: Generate Android project
              working-directory: app
              run: npx expo prebuild --platform android --clean

            - name: Cache Gradle
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                  key: gradle-${{ hashFiles('app/android/**/*.gradle*', 'app/android/**/gradle-wrapper.properties') }}
                  restore-keys: gradle-

            - name: Enable KVM
              run: |
                  echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
                  sudo udevadm control --reload-rules
                  sudo udevadm trigger --name-match=kvm

            - name: Run Maestro flows
              uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
              env:
                  TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
                  TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
              with:
                  api-level: 34
                  arch: x86_64
                  script: |
                      cd app
                      npx expo start &
                      timeout 120 bash -c 'until curl -sf http://localhost:8081/status > /dev/null; do sleep 2; done'
                      cd android && ./gradlew installDebug
                      cd ../..
                      maestro test \
                        --env TEST_EMAIL="${TEST_EMAIL}" \
                        --env TEST_PASSWORD="${TEST_PASSWORD}" \
                        app/.maestro/
