name: E2E

on:
    push:
    workflow_dispatch:

jobs:
    maestro:
        runs-on: [self-hosted, linux, arm64, oracle]
        timeout-minutes: 60
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: "24"
                  cache: "npm"
                  cache-dependency-path: app/package-lock.json

            - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
              with:
                  java-version: "17"
                  distribution: "temurin"

            - name: Install app dependencies
              working-directory: app
              run: npm ci

            - name: Start backend services
              env:
                  DATABASE_USER: ${{ secrets.DATABASE_USER }}
                  DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
              run: docker compose -f docker/docker-compose.dev.yml up -d --wait

            - name: Show service logs on failure
              if: failure()
              env:
                  DATABASE_USER: ${{ secrets.DATABASE_USER }}
                  DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
              run: docker compose -f docker/docker-compose.dev.yml logs postgres backend

            - name: Install dbmate
              run: |
                  curl -fsSL -o /usr/local/bin/dbmate https://github.com/amacneil/dbmate/releases/download/v2.33.0/dbmate-linux-arm64
                  chmod +x /usr/local/bin/dbmate

            - name: Migrate database
              env:
                  DATABASE_USER: ${{ secrets.DATABASE_USER }}
                  DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
              run: dbmate --url "postgresql://$DATABASE_USER:$DATABASE_PASSWORD@localhost:5432/ethos?sslmode=disable" --migrations-dir backend/db/migrations migrate

            - uses: ./.github/actions/setup-maestro
              with:
                  version: "2.5.1"

            - name: Cache APK
              id: apk-cache
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
              with:
                  path: app/android/app/build/outputs/apk/debug/app-debug.apk
                  key: apk-${{ hashFiles('app/app.json', 'app/package-lock.json') }}

            - name: Generate Android project
              if: steps.apk-cache.outputs.cache-hit != 'true'
              working-directory: app
              run: npx expo prebuild --platform android --clean

            - name: Cache Gradle
              if: steps.apk-cache.outputs.cache-hit != 'true'
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                  key: gradle-${{ hashFiles('app/android/**/*.gradle*', 'app/android/**/gradle-wrapper.properties') }}
                  restore-keys: gradle-

            - name: Build APK
              if: steps.apk-cache.outputs.cache-hit != 'true'
              working-directory: app/android
              run: ./gradlew assembleDebug

            - name: Cache AVD
              id: avd-cache
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
              with:
                  path: ~/.android/avd/*
                  key: avd-api34-arm64-v8a

            - name: Create AVD snapshot
              if: steps.avd-cache.outputs.cache-hit != 'true'
              uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
              with:
                  api-level: 34
                  arch: arm64-v8a
                  target: google_apis
                  force-avd-creation: false
                  emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
                  disable-animations: false
                  script: echo "AVD snapshot created"

            - name: Run Maestro flows
              uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
              with:
                  api-level: 34
                  arch: arm64-v8a
                  target: google_apis
                  force-avd-creation: false
                  emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
                  disable-animations: true
                  script: |
                      cd app && npx expo start &
                      timeout 120 bash -c 'until curl -sf http://localhost:8081/status > /dev/null; do sleep 2; done'
                      adb install app/android/app/build/outputs/apk/debug/app-debug.apk
                      ./scripts/run-e2e.sh
