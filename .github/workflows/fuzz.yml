name: Fuzz

on:
    schedule:
        - cron: "0 3 * * *"
    workflow_dispatch:

jobs:
    fuzz:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v6.0.2

            - uses: actions/setup-java@v5.2.0
              with:
                  java-version: "25"
                  distribution: "temurin"
                  cache: "maven"

            - name: Run fuzz tests
              working-directory: backend
              run: mvn test -Pfuzz -Ddocker.skip=true
              env:
                  JAZZER_FUZZ: "1"

            - name: Upload crash artifacts
              if: failure()
              uses: actions/upload-artifact@v7.0.1
              with:
                  name: jazzer-crashes
                  path: backend/crash-*
                  retention-days: 30
