pre-commit:
  piped: true
  commands:
    frontend-format:
      glob: "app/**/*.{ts,tsx,js,json}"
      root: "app/"
      run: npx prettier --write {staged_files}
      stage_fixed: true
    frontend-lint:
      glob: "app/**/*.{ts,tsx}"
      exclude: ["app/src/api/**"]
      root: "app/"
      run: npx eslint --fix {staged_files}
      stage_fixed: true
    backend-format:
      glob: "backend/**/*.java"
      root: "backend/"
      run: mvn spotless:apply -q
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    frontend-typecheck:
      glob: "app/**/*.{ts,tsx}"
      root: "app/"
      run: npm run typecheck
    backend-compile:
      glob: "backend/**/*.java"
      root: "backend/"
      run: mvn compile -q
