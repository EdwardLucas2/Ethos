appId: com.ethos.app
env:
    TEST_PASSWORD: TestPassword123!
---
# Happy path: create a new account
- runScript: gen-test-email.js
- launchApp:
      clearState: true
- runFlow:
      file: subflows/_signup-user.yaml
      env:
          TEST_EMAIL: ${output.TEST_EMAIL}
          TEST_PASSWORD: ${TEST_PASSWORD}

# Error path: same email again → email already exists error
- tapOn:
      id: 'sign-out-button'
- extendedWaitUntil:
      visible: 'WELCOME BACK.'
      timeout: 10000
- tapOn:
      id: 'signup-link'
- extendedWaitUntil:
      visible: 'CREATE ACCOUNT'
      timeout: 10000
- tapOn:
      id: 'email-input'
- inputText: ${output.TEST_EMAIL}
- pressKey: enter
- inputText: ${TEST_PASSWORD}
- pressKey: enter
- extendedWaitUntil:
      visible: 'AN ACCOUNT WITH THIS EMAIL ALREADY EXISTS'
      timeout: 10000
