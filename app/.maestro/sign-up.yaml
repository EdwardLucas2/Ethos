appId: com.ethos.app
---
- runScript:
      file: gen-test-email.js
- launchApp:
      clearState: true
- assertVisible: 'WELCOME BACK.'
- tapOn: 'REQUEST ACCESS'
- assertVisible: 'CREATE ACCOUNT'
- tapOn:
      id: 'email-input'
- inputText: ${output.TEST_SIGNUP_EMAIL}
- hideKeyboard
- tapOn:
      id: 'password-input'
- inputText: ${TEST_PASSWORD}
- pressKey: enter
- tapOn:
      text: 'Not Now'
      optional: true
- assertVisible: 'Welcome!'
