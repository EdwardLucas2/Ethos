appId: com.ethos.app
---
# Sub-flow: fill login credentials from the login screen and land on home.
# Requires TEST_EMAIL and TEST_PASSWORD in the calling flow's env.
- extendedWaitUntil:
      visible: 'WELCOME BACK.'
      timeout: 10000
- tapOn:
      id: 'email-input'
- inputText: ${TEST_EMAIL}
- pressKey: enter
- inputText: ${TEST_PASSWORD}
- pressKey: enter
- tapOn:
      text: 'Not Now'
      optional: true
- extendedWaitUntil:
      visible: 'Welcome!'
      timeout: 10000
