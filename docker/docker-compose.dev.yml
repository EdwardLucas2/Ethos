services:
    postgres:
        image: postgres:18.3
        env_file:
            - ../.env.local
        environment:
            POSTGRES_DB: ethos
            POSTGRES_USER: ${DATABASE_USER}
            POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ethos"]
            interval: 5s
            timeout: 5s
            retries: 10

    supertokens:
        image: registry.supertokens.io/supertokens/supertokens-postgresql:11.4.4
        env_file:
            - ../.env.local
        depends_on:
            postgres:
                condition: service_healthy
        ports:
            - "3567:3567"
        environment:
            POSTGRESQL_CONNECTION_URI: ${DBMATE_URL}
        healthcheck:
            test: >
                bash -c 'exec 3<>/dev/tcp/127.0.0.1/3567 &&
                echo -e "GET /hello HTTP/1.1\r\nhost: 127.0.0.1:3567\r\nConnection: close\r\n\r\n" >&3 &&
                cat <&3 | grep "Hello"'
            interval: 10s
            timeout: 5s
            retries: 5

    auth:
        build:
            context: ../auth
        env_file:
            - ../.env.local
            - ../auth/.env
        depends_on:
            supertokens:
                condition: service_healthy
        ports:
            - "3568:3568"
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "wget -qO- http://localhost:3568/health || exit 1",
                ]
            interval: 10s
            timeout: 5s
            retries: 5

    backend:
        build:
            context: ../backend
            dockerfile: Dockerfile
        env_file:
            - ../.env.local
            - ../backend/.env
        depends_on:
            postgres:
                condition: service_healthy
            supertokens:
                condition: service_healthy
        ports:
            - "8080:8080"
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "wget -qO- http://localhost:8080/health || exit 1",
                ]
            interval: 10s
            timeout: 5s
            retries: 5

volumes:
    postgres_data: